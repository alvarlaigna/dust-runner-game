<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Dust Runner - Alvar Laigna</title>
<style>
  html,body{margin:0;padding:0;width:100%;height:100%;background:#120e0a;
    overflow:hidden;overscroll-behavior:none;-webkit-tap-highlight-color:transparent;}
  /* Grid place-items centers on both axes and, unlike flex align-items:center,
     never clips or pushes the canvas when it exactly matches the viewport. */
  body{display:grid;place-items:center;}
  /* Framebuffer stays 720x720; scale the element to the largest square that fits
     any viewport / itch.io iframe. min(100vw,100vh) == the largest fitting square. */
  canvas.emscripten{display:block;width:min(100vw,100vh);height:min(100vw,100vh);
    image-rendering:auto;touch-action:none;background:#120e0a;outline:none;}
  #status{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
    color:#e0c080;font:16px/1.4 system-ui,sans-serif;}
</style>
</head>
<body>
  <canvas class="emscripten" id="canvas" width="720" height="720"
          oncontextmenu="event.preventDefault()" tabindex="-1"></canvas>
  <div id="status">Loading Dust Runner…</div>
  <script>
    var statusEl = document.getElementById('status');
    var Module = {
      canvas: (function(){ return document.getElementById('canvas'); })(),
      setStatus: function(t){ if (statusEl) statusEl.textContent = t; if (!t) statusEl.style.display='none'; },
      print: function(t){ console.log(t); },
      printErr: function(t){ console.error(t); }
    };
    Module.setStatus('Loading Dust Runner…');
  </script>
  {{{ SCRIPT }}}
</body>
</html>
